version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: dex
      POSTGRES_PASSWORD: superdurable
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d dex -U dex"]
      interval: 3s
      timeout: 5s
      retries: 10
    networks:
      - dex
networks:
  dex:
    driver: bridge