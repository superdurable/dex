version: '3.8'

services:
  mysql:
    image: mysql:8.1
    ports:
      - "3306:3306"
    environment:
      - "MYSQL_ROOT_PASSWORD=superdurable"
    networks:
      - dex
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: dex
      POSTGRES_PASSWORD: superdurable
    ports:
      - "5432:5432"
    networks:
      - dex
networks:
  dex:
    driver: bridge